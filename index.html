<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script>
        const savedTheme = localStorage.getItem('theme') || 'dark';
        document.documentElement.setAttribute('data-theme', savedTheme);
        function toggleTheme() {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const newTheme = currentTheme === 'light' ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Outfit:wght@500;700&display=swap');

        :root {
            --bg-color: #0f172a;
            --road-color: #1e293b;
            --line-color: #f59e0b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --green-glow: 0 0 15px #22c55e, 0 0 30px #22c55e;
            --red-glow: 0 0 15px #ef4444, 0 0 30px #ef4444;
            --panel-bg: rgba(30, 41, 59, 0.8);
            --border-color: rgba(255, 255, 255, 0.1);
            --card-bg: rgba(255, 255, 255, 0.03);
            --lane-divider: rgba(255, 255, 255, 0.3);
            --light-pole: #0f172a;
            --light-pole-border: #334155;
            --chart-border: rgba(255, 255, 255, 0.2);
            --road-shadow: inset 0 0 50px rgba(0, 0, 0, 0.5);
        }

        [data-theme="light"] {
            --bg-color: #f1f5f9;
            --road-color: #cbd5e1;
            --line-color: #fbbf24;
            --text-main: #0f172a;
            --text-muted: #475569;
            --green-glow: 0 0 10px #22c55e;
            --red-glow: 0 0 10px #ef4444;
            --panel-bg: rgba(255, 255, 255, 0.9);
            --border-color: rgba(0, 0, 0, 0.1);
            --card-bg: rgba(255, 255, 255, 0.6);
            --lane-divider: rgba(0, 0, 0, 0.15);
            --light-pole: #e2e8f0;
            --light-pole-border: #94a3b8;
            --chart-border: rgba(0, 0, 0, 0.1);
            --road-shadow: inset 0 0 20px rgba(0, 0, 0, 0.1);
        }

        [data-theme="dark"] .sun-icon {
            display: none !important;
        }

        [data-theme="dark"] .moon-icon {
            display: block !important;
        }

        [data-theme="light"] .sun-icon {
            display: block !important;
        }

        [data-theme="light"] .moon-icon {
            display: none !important;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            display: flex;
            height: 100vh;
            overflow: hidden;
            background-image:
                radial-gradient(circle at 15% 50%, rgba(34, 197, 94, 0.05), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(56, 189, 248, 0.05), transparent 25%);
            margin: 0;
            padding: 20px;
            gap: 50px;
        }

        .dashboard {
            width: 380px;
            background: var(--panel-bg);
            backdrop-filter: blur(12px);
            border-right: 1px solid var(--border-color);
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            z-index: 10;
            overflow-y: auto;
            max-height: 100vh;
        }

        .header h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 1.8rem;
            background: linear-gradient(135deg, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        .header p {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 1rem;
        }

        .log-box {
            background: var(--bg-color);
            border-radius: 8px;
            padding: 1rem;
            font-family: monospace;
            font-size: 0.85rem;
            color: #34d399;
            height: 120px;
            overflow-y: auto;
            border: 1px solid var(--border-color);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        .stat-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 1rem;
            text-align: center;
            transition: all 0.3s ease;
        }

        .stat-card.active {
            border-color: #22c55e;
            box-shadow: 0 0 15px rgba(34, 197, 94, 0.2);
        }

        .stat-card h3 {
            font-size: 0.8rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .stat-card .val {
            font-size: 2rem;
            font-weight: 800;
            font-family: 'Outfit';
            margin: 0.5rem 0;
        }

        .stat-card .light {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            display: inline-block;
            background: #ef4444;
        }

        .stat-card.active .light {
            background: #22c55e;
            box-shadow: var(--green-glow);
        }

        .btn {
            background: linear-gradient(135deg, #6366f1, #3b82f6);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.2s;
            font-family: 'Inter';
            margin-top: auto;
        }

        .btn:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }

        .btn-amb {
            background: linear-gradient(135deg, #ef4444, #f59e0b);
            margin-top: 10px;
        }

        /* SIMULATION CANVAS AREA */
        /* Road Markings */
        .marking {
            position: absolute;
            color: rgba(255, 255, 255, 0.3);
            font-size: 32px;
            font-weight: 900;
            pointer-events: none;
            z-index: 1;
            text-align: center;
            line-height: 1;
        }

        .road-v .marking-n-s {
            top: 40px;
            left: 330px;
            transform: rotate(180deg);
        }

        /* SB Straight */
        .road-v .marking-n-l {
            top: 100px;
            left: 310px;
            transform: rotate(180deg);
            font-size: 20px;
        }

        /* SB Left */

        .road-v .marking-s-s {
            bottom: 40px;
            left: 230px;
            transform: rotate(0deg);
        }

        /* NB Straight */
        .road-v .marking-s-l {
            bottom: 100px;
            left: 250px;
            transform: rotate(0deg);
            font-size: 20px;
        }

        /* NB Left */

        .road-h .marking-w-s {
            left: 40px;
            top: 230px;
            transform: rotate(90deg);
        }

        /* EB Straight */
        .road-h .marking-w-l {
            left: 100px;
            top: 250px;
            transform: rotate(90deg);
            font-size: 20px;
        }

        /* EB Left */

        .road-h .marking-e-s {
            right: 40px;
            top: 330px;
            transform: rotate(-90deg);
        }

        /* WB Straight */
        .road-h .marking-e-l {
            right: 100px;
            top: 310px;
            transform: rotate(-90deg);
            font-size: 20px;
        }

        /* WB Left */

        .simulation {
            flex: 1;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* ROADS */
        .intersection-wrapper {
            position: relative;
            width: 600px;
            height: 600px;
            overflow: hidden;
            border-radius: 20px;
        }

        .road-v,
        .road-h {
            position: absolute;
            background: var(--road-color);
            box-shadow: var(--road-shadow);
        }

        .road-v {
            width: 200px;
            height: 100%;
            top: 0;
            left: 200px;
        }

        .road-h {
            height: 200px;
            width: 100%;
            left: 0;
            top: 200px;
        }

        /* Double yellow center lines */
        .road-v::before {
            content: '';
            position: absolute;
            width: 4px;
            height: 100%;
            left: 98px;
            border-left: 2px solid var(--line-color);
            border-right: 2px solid var(--line-color);
        }

        .road-h::before {
            content: '';
            position: absolute;
            height: 4px;
            width: 100%;
            top: 98px;
            border-top: 2px solid var(--line-color);
            border-bottom: 2px solid var(--line-color);
        }

        /* Dashed 4-lane dividers */
        .road-v::after {
            content: '';
            position: absolute;
            width: 100px;
            height: 100%;
            border-left: 2px dashed var(--lane-divider);
            border-right: 2px dashed var(--lane-divider);
            left: 50px;
        }

        .road-h::after {
            content: '';
            position: absolute;
            height: 100px;
            width: 100%;
            border-top: 2px dashed var(--lane-divider);
            border-bottom: 2px dashed var(--lane-divider);
            top: 50px;
        }

        /* Center smooth intersection */
        .center-box {
            position: absolute;
            width: 200px;
            height: 200px;
            background: var(--road-color);
            top: 200px;
            left: 200px;
            z-index: 2;
        }

        /* Traffic Lights */
        .light-pole {
            position: absolute;
            width: 24px;
            height: 50px;
            background: var(--light-pole);
            border: 2px solid var(--light-pole-border);
            border-radius: 12px;
            z-index: 5;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-evenly;
        }

        .light-bulb {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #333;
        }

        .light-bulb.red {
            background: #ef4444;
            box-shadow: var(--red-glow);
        }

        .light-bulb.green {
            background: #22c55e;
            box-shadow: var(--green-glow);
        }

        /* Pole Positions */
        #pole-n {
            top: 140px;
            right: 165px;
        }

        #pole-s {
            bottom: 140px;
            left: 165px;
        }

        #pole-e {
            bottom: 165px;
            right: 140px;
            flex-direction: row;
            width: 50px;
            height: 24px;
        }

        #pole-w {
            top: 165px;
            left: 140px;
            flex-direction: row;
            width: 50px;
            height: 24px;
        }

        /* Cars */
        .car {
            position: absolute;
            width: 24px;
            height: 44px;
            background: linear-gradient(to bottom, #38bdf8, #0284c7);
            border-radius: 6px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            z-index: 3;
            transition: top 1.3s linear, left 1.3s linear, transform 0.4s ease-in-out;
            display: flex;
            align-content: center;
            justify-content: center;
        }

        .car::before {
            content: '';
            position: absolute;
            width: 20px;
            height: 8px;
            background: rgba(0, 0, 0, 0.3);
            top: 8px;
            border-radius: 2px;
        }

        .car.ambulance {
            background: white !important;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.5);
            animation: pulse-siren 0.5s infinite alternate;
        }

        .car.h-axis {
            width: 44px;
            height: 24px;
        }

        .car.h-axis::before {
            width: 8px;
            height: 20px;
            left: 8px;
            top: 2px;
        }

        @keyframes pulse-siren {
            0% {
                box-shadow: 0 0 15px #ef4444;
            }

            100% {
                box-shadow: 0 0 15px #3b82f6;
            }
        }
    </style>
</head>

<body>
    <button class="theme-toggle" onclick="toggleTheme()" title="Toggle Theme"
        style="position:fixed; top:20px; right:20px; z-index:1000; background:var(--panel-bg); color:var(--text-main); border:1px solid var(--border-color); border-radius:50%; width:44px; height:44px; cursor:pointer; display:flex; align-items:center; justify-content:center; box-shadow:0 4px 6px rgba(0,0,0,0.1); transition: 0.2s;">
        <span class="sun-icon" style="font-size:22px;">☀️</span>
        <span class="moon-icon" style="font-size:22px; display:none;">🌙</span>
    </button>
    <div class="dashboard">
        <div class="header">
            <h1>Traffic Vision AI</h1>
            <p>Real-time Intelligent Management System</p>
        </div>



        <div class="stats-grid">
            <div class="stat-card" id="card-n">
                <h3>North</h3>
                <div class="val" id="count-n">0</div>
                <div class="light" id="light-icon-n"></div>
            </div>
            <div class="stat-card" id="card-s">
                <h3>South</h3>
                <div class="val" id="count-s">0</div>
                <div class="light" id="light-icon-s"></div>
            </div>
            <div class="stat-card" id="card-w">
                <h3>West</h3>
                <div class="val" id="count-w">0</div>
                <div class="light" id="light-icon-w"></div>
            </div>
            <div class="stat-card" id="card-e">
                <h3>East</h3>
                <div class="val" id="count-e">0</div>
                <div class="light" id="light-icon-e"></div>
            </div>
        </div>

        <button class="btn" onclick="spawnRandomTraffic()">+ Add Random Traffic</button>
        <button class="btn btn-amb" onclick="spawnAmbulance()">+ Emergency Override</button>
        <button class="btn" onclick="window.open('ambulance_app.html', '_blank')"
            style="background: linear-gradient(135deg, #10b981, #059669); margin-top: 15px;">📱 Open SOS
            MediRoute</button>

        <div class="header" style="margin-top: 1.5rem; margin-bottom: 0;">
            <p
                style="color:var(--text-main); font-weight:800; font-size:12px; text-transform:uppercase; letter-spacing:1px; margin:0;">
                Total Traffic Backlog (Wait Score)</p>
        </div>
        <div class="chart-container"
            style="display:flex; align-items:flex-end; height:100px; gap:40px; margin-top:35px; border-bottom:1px solid var(--chart-border); padding-bottom:5px; margin-bottom: 25px; justify-content:center;">
            <div id="fixed-bar"
                style="width: 60px; background:linear-gradient(to top, #ef4444, #f43f5e); height: 50%; border-radius:4px 4px 0 0; position:relative; transition: height 0.5s;">
                <span class="label"
                    style="position:absolute; bottom:-25px; width:100%; text-align:center; font-size:11px; color:var(--text-muted); white-space:nowrap; left:50%; transform:translateX(-50%);">Fixed
                    30s</span>
                <span id="fixed-metric"
                    style="position:absolute; top:-25px; width:100%; text-align:center; font-size:14px; font-weight:bold; color:#f43f5e;">0</span>
            </div>
            <div id="smart-bar"
                style="width: 60px; background:linear-gradient(to top, #22c55e, #10b981); height: 10%; border-radius:4px 4px 0 0; position:relative; transition: height 0.5s;">
                <span class="label"
                    style="position:absolute; bottom:-25px; width:100%; text-align:center; font-size:11px; color:var(--text-muted); white-space:nowrap; left:50%; transform:translateX(-50%);">Smart
                    AI</span>
                <span id="smart-metric"
                    style="position:absolute; top:-25px; width:100%; text-align:center; font-size:14px; font-weight:bold; color:#10b981;">0</span>
            </div>
        </div>
    </div>

    <div class="simulation">
        <div class="intersection-wrapper" id="world">
            <!-- ROADS -->
            <div class="road road-v">
            </div>
            <div class="road road-h">
            </div>
            <div class="center-box"></div>

            <!-- LIGHTS -->
            <div class="light-pole" id="pole-n">
                <div class="light-bulb top"></div>
                <div class="light-bulb bot"></div>
            </div>
            <div class="light-pole" id="pole-s">
                <div class="light-bulb top"></div>
                <div class="light-bulb bot"></div>
            </div>
            <div class="light-pole" id="pole-w">
                <div class="light-bulb top"></div>
                <div class="light-bulb bot"></div>
            </div>
            <div class="light-pole" id="pole-e">
                <div class="light-bulb top"></div>
                <div class="light-bulb bot"></div>
            </div>
        </div>
    </div>


    <script>
        // Data Structures backing the HTML Logic
        const LANES = {
            'n': { queue: [], light: 'red', name: 'North', drawWaitX: 313, drawWaitY: 145, dirY: 1, dirX: 0, starvation: 0, isVert: true, enterX: 313, enterY: -50, greenStartDensity: 0 },
            's': { queue: [], light: 'red', name: 'South', drawWaitX: 213, drawWaitY: 410, dirY: -1, dirX: 0, starvation: 0, isVert: true, enterX: 213, enterY: 650, greenStartDensity: 0 },
            'w': { queue: [], light: 'red', name: 'West', drawWaitX: 145, drawWaitY: 213, dirY: 0, dirX: 1, starvation: 0, isVert: false, enterX: -50, enterY: 213, greenStartDensity: 0 },
            'e': { queue: [], light: 'red', name: 'East', drawWaitX: 410, drawWaitY: 313, dirY: 0, dirX: -1, starvation: 0, isVert: false, enterX: 650, enterY: 313, greenStartDensity: 0 }
        };

        const world = document.getElementById('world');
        let carIdCounter = 0;

        // Establish an invisible smart city network channel across multiple browser tabs!
        const channel = new BroadcastChannel('smart_city_network');
        channel.onmessage = (event) => {
            if (event.data === 'DISPATCH_AMBULANCE') {
                logMsg("<span style='color:#3b82f6'>[NETWORK] Override Received from SOS MediRoute!</span>");
                spawnAmbulance();
            }
        };

        // Analytics Tracking
        let fixedQueues = { 'n': 0, 's': 0, 'w': 0, 'e': 0 };
        let fixedCurrentGreen = 'n';
        let fixedTicks = 0;
        let fixedCumulativeWait = 0;
        let smartCumulativeWait = 0;

        function logMsg(msg) {
            console.log(msg.replace(/<[^>]*>?/gm, ''));
        }

        // Initialize Lights
        ['n', 's', 'w', 'e'].forEach(node => setPoleColor(node, 'red'));

        function setPoleColor(laneCode, color) {
            LANES[laneCode].light = color;
            const pole = document.getElementById(`pole-${laneCode}`);
            if (laneCode === 'n' || laneCode === 's') {
                pole.children[0].className = 'light-bulb top ' + (color === 'red' ? 'red' : '');
                pole.children[1].className = 'light-bulb bot ' + (color === 'green' ? 'green' : '');
            } else {
                pole.children[0].className = 'light-bulb top ' + (color === 'red' ? 'red' : '');
                pole.children[1].className = 'light-bulb bot ' + (color === 'green' ? 'green' : '');
            }

            // Stats card updates
            const card = document.getElementById(`card-${laneCode}`);
            if (color === 'green') {
                card.classList.add('active');
            } else {
                card.classList.remove('active');
            }

            updateStats();
        }

        function switchGreen(targetLane) {
            ['n', 's', 'w', 'e'].forEach(l => {
                if (l !== targetLane) setPoleColor(l, 'red');
            });
            setPoleColor(targetLane, 'green');
            // Capture the density at the moment the green is given (50% drainage rule)
            LANES[targetLane].greenStartDensity = LANES[targetLane].queue.length;
        }

        function updateStats() {
            ['n', 's', 'w', 'e'].forEach(l => {
                document.getElementById(`count-${l}`).innerText = LANES[l].queue.length;
            });
        }

        function spawnCar(laneCode, isAmbulance = false) {
            let config = LANES[laneCode];
            let carEl = document.createElement('div');
            carEl.className = 'car ' + (isAmbulance ? 'ambulance' : '');
            carEl.id = 'car_' + (++carIdCounter);

            // Set initial rotation based on direction (Corrected orientation)
            let initialRot = 0;
            if (laneCode === 'n') initialRot = 180;
            if (laneCode === 's') initialRot = 0;
            if (laneCode === 'w') initialRot = 90;
            if (laneCode === 'e') initialRot = -90;
            carEl.style.transform = `rotate(${initialRot}deg)`;

            // Random colors for normal cars
            if (!isAmbulance) {
                const colors = ['#38bdf8', '#fbbf24', '#a855f7', '#f43f5e', '#10b981'];
                carEl.style.background = `linear-gradient(to bottom, ${colors[Math.floor(Math.random() * colors.length)]}, #333)`;
            } else {
                carEl.innerHTML = `<span style="color:red; font-weight:900; font-size:18px; line-height:44px; text-align:center; width:100%;">+</span>`;
            }

            // Decide turn intent based on LHD Lane Discipline:
            // Lane 1 (Outer): Straight or Left only.
            // Lane 0 (Inner): Straight or Right only.
            let index = config.queue.length;
            let laneIdx = (index % 2); // 0 = Inner, 1 = Outer

            let intent = 'straight';
            if (!isAmbulance && Math.random() < 0.5) {
                if (laneIdx === 1) intent = 'left'; // Outer lane turns left (tight)
                else intent = 'right'; // Inner lane turns right (wide)
            }

            // Start position physics mapping
            let sideOffset = (laneIdx === 0) ? 0 : 50;
            let startX = config.enterX;
            let startY = config.enterY;
            if (config.isVert) startX += sideOffset;
            else startY += sideOffset;

            carEl.style.left = startX + 'px';
            carEl.style.top = startY + 'px';

            world.appendChild(carEl);
            void carEl.offsetWidth;

            let carObj = { el: carEl, id: carEl.id, isAmb: isAmbulance, intent: intent, rotation: initialRot, laneIdx: laneIdx };
            config.queue.push(carObj);
            fixedQueues[laneCode]++;

            repositionQueues();
            updateStats();
            evaluateGrid();
        }

        function spawnRandomTraffic() {
            // Spawn larger blocks of traffic (2 to 6 cars at once)
            let carsToSpawn = Math.floor(Math.random() * 5) + 2;
            for (let i = 0; i < carsToSpawn; i++) {
                let keys = Object.keys(LANES);
                let randLane = keys[Math.floor(Math.random() * keys.length)];
                spawnCar(randLane);
            }
        }

        function spawnAmbulance() {
            let keys = Object.keys(LANES);
            let randLane = keys[Math.floor(Math.random() * keys.length)];
            spawnCar(randLane, true);
        }

        window.triggerSmartCityAmbulance = spawnAmbulance;

        function repositionQueues() {
            const GAP = 55;
            ['n', 's', 'w', 'e'].forEach(l => {
                let config = LANES[l];
                config.queue.forEach((car, index) => {
                    let offIndex = Math.floor(index / 2); // 2 cars per row
                    let sideOffset = (index % 2 === 0) ? 0 : 50; // shift to 2nd lane

                    let rx = config.drawWaitX - (config.dirX * offIndex * GAP);
                    let ry = config.drawWaitY - (config.dirY * offIndex * GAP);

                    if (config.isVert) rx += sideOffset;
                    else ry += sideOffset;

                    car.el.style.left = rx + 'px';
                    car.el.style.top = ry + 'px';
                });
            });
        }

        // AI Logic Engine - Ticks every 1.5 seconds
        setInterval(() => {
            evaluateGrid();
            updateComparisonChart();
        }, 1500);

        // Continuous Car Passage Engine - Flows much faster while light is green!
        setInterval(() => {
            letCarsPass();
        }, 500);

        function updateComparisonChart() {
            // Simulated Fixed Timer logic (rotates strictly every 20 ticks = 30 seconds)
            fixedTicks++;
            if (fixedTicks >= 20) {
                fixedTicks = 0;
                const order = ['n', 'e', 's', 'w']; // normal clockwise rotation
                fixedCurrentGreen = order[(order.indexOf(fixedCurrentGreen) + 1) % 4];
            }

            // Fixed passage logic
            if (fixedQueues[fixedCurrentGreen] > 0) {
                fixedQueues[fixedCurrentGreen] -= Math.min(2, fixedQueues[fixedCurrentGreen]);
            }

            // Accumulate wait sizes
            ['n', 's', 'w', 'e'].forEach(l => {
                fixedCumulativeWait += fixedQueues[l];
                smartCumulativeWait += LANES[l].queue.length;
            });

            // Prevent graph numbers from getting too massive for presentation
            if (fixedCumulativeWait >= 1500) {
                fixedCumulativeWait = 0;
                smartCumulativeWait = 0;
                logMsg("<span style='color:#facc15;font-size:11px'>[Analytics] Graph Auto-Reset at 1500</span>");
            }

            // Output Graph
            let maxWait = Math.max(fixedCumulativeWait, smartCumulativeWait, 10);

            let fixHeight = Math.max((fixedCumulativeWait / maxWait) * 100, 5); // 5% minimum visibility
            let smartHeight = Math.max((smartCumulativeWait / maxWait) * 100, 5);

            document.getElementById('fixed-bar').style.height = fixHeight + '%';
            document.getElementById('fixed-metric').innerText = fixedCumulativeWait;

            document.getElementById('smart-bar').style.height = smartHeight + '%';
            document.getElementById('smart-metric').innerText = smartCumulativeWait;
        }

        function evaluateGrid() {
            // Check Ambulance Override (always bypasses drainage rule)
            let ambLane = null;
            let maxDensity = -1;
            let maxLane = null;

            // Find current green lane and manage starvation
            let currentGreen = null;
            for (let l of ['n', 's', 'w', 'e']) {
                if (LANES[l].light === 'green') {
                    currentGreen = l;
                    LANES[l].starvation = 0; // Reset active lane starvation
                } else if (LANES[l].queue.length > 0) {
                    LANES[l].starvation += 1; // Increase wait priority for red lanes!
                }
            }

            for (let l of ['n', 's', 'w', 'e']) {
                let laneData = LANES[l];
                let hasAmb = laneData.queue.some(c => c.isAmb);
                if (hasAmb) { ambLane = l; }

                // Calculate effective density
                let effectiveDensity = laneData.queue.length;
                effectiveDensity += Math.floor(laneData.starvation / 2);
                if (l === currentGreen && laneData.queue.length > 0) {
                    effectiveDensity += 3;
                }
                if (effectiveDensity > maxDensity) {
                    maxDensity = effectiveDensity;
                    maxLane = l;
                }
            }

            // --- AMBULANCE OVERRIDE (immediate, ignores drainage) ---
            if (ambLane) {
                if (LANES[ambLane].light !== 'green') {
                    logMsg(`<span style="color:#ef4444;font-weight:bold;">[!] Override: Ambulance in ${LANES[ambLane].name}</span>`);
                    switchGreen(ambLane);
                }
                return;
            }

            // --- 50% DRAINAGE RULE ---
            // Do not switch away from current green lane until at least half its
            // initial queue has cleared.
            if (currentGreen) {
                let greenLane = LANES[currentGreen];
                let halfThreshold = Math.floor(greenLane.greenStartDensity / 2);
                if (greenLane.greenStartDensity > 1 && greenLane.queue.length > halfThreshold) {
                    // Still draining - hold the green signal
                    return;
                }
            }

            // --- GREEDY SWITCH ---
            if (maxLane && maxDensity > 0) {
                if (LANES[maxLane].light !== 'green') {
                    switchGreen(maxLane);
                }
            }
        }

        function letCarsPass() {
            for (let l of ['n', 's', 'w', 'e']) {
                let config = LANES[l];
                if (config.light === 'green' && config.queue.length > 0) {
                    let passCount = Math.min(2, config.queue.length);
                    for (let i = 0; i < passCount; i++) {
                        let car = config.queue.shift();

                        // Use a closure or stagger to prevent overlap
                        setTimeout(() => {
                            let startX = parseFloat(car.el.style.left);
                            let startY = parseFloat(car.el.style.top);

                            if (car.intent === 'straight') {
                                car.el.style.transition = 'top 1.3s linear, left 1.3s linear';
                                car.el.style.left = (startX + config.dirX * 700) + 'px';
                                car.el.style.top = (startY + config.dirY * 700) + 'px';
                            } else {
                                // Turn logic
                                let pivotX = startX, pivotY = startY;
                                let exitX, exitY, exitRot;
                                // Calculate pivot and exit based on Target Lane coordinates
                                if (l === 'n') { // Southbound (180deg start, Lane 0=313(I), 1=363(O))
                                    if (car.intent === 'left') {
                                        exitY = (car.laneIdx === 1) ? 213 : 263; // To EB Lane 0(O) or 1(I)
                                        pivotX = startX; pivotY = exitY;
                                        exitX = 700; exitRot = 90;
                                    } else {
                                        exitY = (car.laneIdx === 0) ? 313 : 363; // To WB Lane 0(I) or 1(O)
                                        pivotX = startX; pivotY = exitY;
                                        exitX = -100; exitRot = 270;
                                    }
                                } else if (l === 's') { // Northbound (0deg start, Lane 0=263(I), 1=213(O))
                                    if (car.intent === 'left') {
                                        exitY = (car.laneIdx === 1) ? 363 : 313; // To WB Lane 1(O) or 0(I)
                                        pivotX = startX; pivotY = exitY;
                                        exitX = -100; exitRot = -90;
                                    } else {
                                        exitY = (car.laneIdx === 0) ? 263 : 213; // To EB Lane 1(I) or 0(O)
                                        pivotX = startX; pivotY = exitY;
                                        exitX = 700; exitRot = 90;
                                    }
                                } else if (l === 'w') { // Eastbound (90deg start, Lane 0=213(O), 1=263(I))
                                    if (car.intent === 'left') {
                                        exitX = (car.laneIdx === 0) ? 213 : 263; // To NB Lane 1(O) or 0(I)
                                        pivotY = startY; pivotX = exitX;
                                        exitY = -100; exitRot = 180;
                                    } else {
                                        exitX = (car.laneIdx === 1) ? 313 : 363; // To SB Lane 0(I) or 1(O)
                                        pivotY = startY; pivotX = exitX;
                                        exitY = 700; exitRot = 0;
                                    }
                                } else if (l === 'e') { // Westbound (-90deg start, Lane 0=313(I), 1=363(O))
                                    if (car.intent === 'left') {
                                        exitX = (car.laneIdx === 1) ? 363 : 313; // To SB Lane 1(O) or 0(I)
                                        pivotY = startY; pivotX = exitX;
                                        exitY = 700; exitRot = 0;
                                    } else {
                                        exitX = (car.laneIdx === 0) ? 263 : 213; // To NB Lane 0(I) or 1(O)
                                        pivotY = startY; pivotX = exitX;
                                        exitY = -100; exitRot = 180;
                                    }
                                }

                                // Step 1: Junction Entrance
                                car.el.style.transition = 'top 0.4s linear, left 0.4s linear, transform 0.4s';
                                car.el.style.left = pivotX + 'px';
                                car.el.style.top = pivotY + 'px';

                                // Step 2: pivot and exit
                                setTimeout(() => {
                                    car.el.style.transition = 'top 0.9s linear, left 0.9s linear, transform 0.4s';
                                    car.el.style.transform = `rotate(${exitRot}deg)`;
                                    car.el.style.left = exitX + 'px';
                                    car.el.style.top = exitY + 'px';
                                }, 400);
                            }

                            setTimeout(() => car.el.remove(), 1500);
                        }, i * 400); // 400ms stagger between car 1 and car 2
                    }
                    repositionQueues();
                    updateStats();
                }
            }
        }

        // Initial setup
        setTimeout(spawnRandomTraffic, 500);

        // Automatically spawn heavy random traffic continuously
        setInterval(() => {
            // 90% chance to spawn some cars every 1 second (massive traffic increase)
            if (Math.random() > 0.1) {
                spawnRandomTraffic();
            }
        }, 1000);
    </script>
