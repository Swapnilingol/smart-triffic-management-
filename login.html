<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script>
        const savedTheme = localStorage.getItem('theme') || 'dark';
        document.documentElement.setAttribute('data-theme', savedTheme);
        function toggleTheme() {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const newTheme = currentTheme === 'light' ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap');

        :root {
            --bg-main: #0f172a;
            --panel-bg: rgba(30, 41, 59, 0.85);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-glow: #3b82f6;
            --border-color: rgba(255, 255, 255, 0.1);
            --input-bg: rgba(0, 0, 0, 0.2);
            --shadow-color: rgba(0, 0, 0, 0.5);
        }

        [data-theme="light"] {
            --bg-main: #f1f5f9;
            --panel-bg: rgba(255, 255, 255, 0.9);
            --text-main: #0f172a;
            --text-muted: #475569;
            --border-color: rgba(0, 0, 0, 0.1);
            --input-bg: rgba(0, 0, 0, 0.05);
            --shadow-color: rgba(0, 0, 0, 0.1);
        }

        [data-theme="dark"] .sun-icon { display: none !important; }
        [data-theme="dark"] .moon-icon { display: block !important; }
        [data-theme="light"] .sun-icon { display: block !important; }
        [data-theme="light"] .moon-icon { display: none !important; }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-main);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Ambient Background Glow */
        body::before {
            content: '';
            position: absolute;
            width: 800px;
            height: 800px;
            background: radial-gradient(circle, rgba(59, 130, 246, 0.15) 0%, rgba(0, 0, 0, 0) 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 0;
        }

        .login-container {
            width: 420px;
            background: var(--panel-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 40px;
            position: relative;
            z-index: 10;
            box-shadow: 0 25px 50px -12px var(--shadow-color);
            text-align: center;
        }

        .logo-ring {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: 3px solid rgba(59, 130, 246, 0.3);
            border-top-color: #3b82f6;
            margin: 0 auto 25px auto;
            animation: spin 3s linear infinite;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-ring::after {
            content: '';
            width: 50px;
            height: 50px;
            background: rgba(59, 130, 246, 0.1);
            border-radius: 50%;
            border: 2px dashed #3b82f6;
            animation: spin-reverse 4s linear infinite;
        }

        @keyframes spin {
            100% {
                transform: rotate(360deg);
            }
        }

        @keyframes spin-reverse {
            100% {
                transform: rotate(-360deg);
            }
        }

        h1 {
            color: var(--text-main);
            font-size: 24px;
            font-weight: 800;
            letter-spacing: -0.5px;
            margin-bottom: 5px;
        }

        p {
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 35px;
        }

        .input-group {
            text-align: left;
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            color: var(--text-muted);
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .input-group input {
            width: 100%;
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 15px 15px;
            border-radius: 10px;
            font-size: 16px;
            outline: none;
            transition: 0.3s;
        }

        .input-group input:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.3);
        }

        .login-btn {
            width: 100%;
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 800;
            cursor: pointer;
            margin-top: 15px;
            transition: 0.3s;
            box-shadow: 0 10px 20px rgba(59, 130, 246, 0.3);
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 25px rgba(59, 130, 246, 0.4);
        }

        .login-btn:active {
            transform: scale(0.98);
        }

        .sys-status {
            margin-top: 30px;
            font-size: 12px;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .dot {
            width: 8px;
            height: 8px;
            background: #10b981;
            border-radius: 50%;
            box-shadow: 0 0 10px #10b981;
            animation: pulse-dot 1.5s infinite;
        }

        @keyframes pulse-dot {
            0% {
                box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.4);
            }

            70% {
                box-shadow: 0 0 0 6px rgba(0, 0, 0, 0);
            }

            100% {
                box-shadow: 0 0 0 0 rgba(0, 0, 0, 0);
            }
        }
    </style>
</head>

<body>
    <button class="theme-toggle" onclick="toggleTheme()" title="Toggle Theme" style="position:fixed; top:20px; right:20px; z-index:1000; background:var(--panel-bg); color:var(--text-main); border:1px solid var(--border-color); border-radius:50%; width:44px; height:44px; cursor:pointer; display:flex; align-items:center; justify-content:center; box-shadow:0 4px 6px rgba(0,0,0,0.1); transition: 0.2s;">
        <span class="sun-icon" style="font-size:22px;">☀️</span>
        <span class="moon-icon" style="font-size:22px; display:none;">🌙</span>
    </button>
    <div class="login-container">
        <!-- Abstract Radar/Tech Ring -->
        <div class="logo-ring"></div>

        <h1>Traffic Vision AI</h1>
        <p>Smart City Control Center Authentication</p>

        <!-- Dummy Form -->
        <form onsubmit="authenticate(event)">
            <div class="input-group">
                <label>Operator ID</label>
                <input type="text" id="username" placeholder="SYS-ADMIN-01" required value="ADMIN">
            </div>

            <div class="input-group">
                <label>Security Clearance</label>
                <input type="password" id="password" placeholder="••••••••" required value="password">
            </div>

            <button type="submit" class="login-btn">AUTHORIZE ACCESS</button>
        </form>

        <div class="sys-status">
            <div class="dot"></div>
            Core Mainframe Online
        </div>
    </div>

    <script>
        function authenticate(e) {
            e.preventDefault();

            // Provide a realistic 1-second "connecting" feel before forwarding
            const btn = document.querySelector('.login-btn');
            btn.innerText = "AUTHENTICATING...";
            btn.style.background = "#10b981"; // Valid green color
            btn.style.boxShadow = "0 10px 20px rgba(16, 185, 129, 0.3)";

            setTimeout(() => {
                // Instantly open the dashboard exactly locally as requested
                window.location.href = "index.html";
            }, 800);
        }
    </script>
</body>

</html>
